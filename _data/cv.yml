    Projects:
      - name: SOFR OIS Yield Curve Construction
        summary: Designed and implemented a full pipeline to construct the SOFR OIS zero-coupon yield curve from par swap rates using Python (rateslib).
        highlights:
          - Developed a numerical bootstrapping framework to recover discount factors via a bisection root-finding algorithm.
          - Derived zero rates and constructed a smooth, arbitrage-free term structure using log-linear interpolation.

      - name: Volatility Forecasting
        summary: Compared GARCH out-of-sample predictive accuracy with ML models for Euro Stoxx 50.
        highlights:
          - Focused on the development of an LSTM neural network.
          - Evaluated the performance of one-step-ahead predictions.

      - name: Option Pricing and Hedging with Greeks
        summary: Analyzed the Black–Scholes–Merton option pricing formula and its application in risk management.
        highlights:
          - Derived the formula using replication and risk-neutral valuation.
          - Implemented hedging strategies for short gamma traders.

      - name: Statistical Modeling - Guns Panel Data
        summary: Analyzed U.S. Guns panel data using regression methods for explanatory purposes.
        highlights:
          - Implemented cross-validation, LASSO, OLS, and kernel regression.

      - name: Gaussian Processes
        summary: Collaborating with Dr Francesca Panero and Dr Sahoko Ishida on Gaussian Process Regression.
        highlights:
          - Responsible for coding custom kernels in GPFlow (TensorFlow-based library).

